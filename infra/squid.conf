# =========================
# Squid allowlist proxy
# =========================

# Listen on standard proxy port
http_port 3128

# -------------------------
# Allow only Slack domains
# -------------------------
acl allowed_domains dstdomain \
    .slack.com \
    .hooks.slack.com

# Allow HTTPS CONNECT only (port 443) and only to allowed domains
acl SSL_ports port 443
acl CONNECT method CONNECT

http_access allow allowed_domains SSL_ports CONNECT
http_access deny all

# -------------------------
# No caching (reduce disk needs)
# -------------------------
cache deny all
cache_mem 0
maximum_object_size 0 KB
maximum_object_size_in_memory 0 KB

# Avoid creating swap/cache dirs (still keep /var/spool/squid tmpfs just in case)
cache_dir null /tmp

# -------------------------
# Privacy hardening
# -------------------------
via off
forwarded_for delete
request_header_access X-Forwarded-For deny all
request_header_access Via deny all

# -------------------------
# Log to stdout/stderr (read-only filesystem friendly)
# -------------------------
# Access log to stdout:
access_log stdio:/dev/stdout

# Cache/logging noise:
cache_log stdio:/dev/stderr
cache_store_log none
logfile_rotate 0

# Don't write a PID file to disk
pid_filename none

# If Squid tries to dump core, keep it in tmpfs
coredump_dir /tmp