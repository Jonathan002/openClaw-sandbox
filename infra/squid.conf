# Allow only Slack domains
acl allowed_domains dstdomain \
    .slack.com \
    .hooks.slack.com

# Allow HTTPS CONNECT only to Slack
acl SSL_ports port 443
acl CONNECT method CONNECT

http_access allow allowed_domains SSL_ports CONNECT
http_access deny all

http_port 3128
        
# No caching
cache deny all

# Privacy hardening
via off
forwarded_for delete