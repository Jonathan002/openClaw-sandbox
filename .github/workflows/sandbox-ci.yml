name: Sandbox Security CI

on:
  workflow_dispatch:
  push:
    paths:
      - infra/docker-compose.yml
      - infra/squid.conf
      - infra/openclaw/**
      - policy/**
      - .github/workflows/sandbox-ci.yml
  pull_request:

jobs:
  sandbox-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start Sandbox
        run: docker compose -f infra/docker-compose.yml up -d --build

      - name: Show openclaw logs (debug)
        if: always()
        run: |
          docker ps -a
          docker logs --tail 200 openclaw-test || true

      - name: Wait for openclaw-test to be running
        run: |
          set -e
          for i in $(seq 1 30); do
            state="$(docker inspect -f '{{.State.Status}}' openclaw-test 2>/dev/null || echo starting)"
            echo "openclaw-test status: $state"
            if [ "$state" = "running" ]; then
              exit 0
            fi
            docker logs --tail 120 openclaw-test || true
            sleep 2
          done
          docker ps -a
          docker logs --tail 200 openclaw-test || true
          exit 1

      - name: Verify no internet route
        run: |
          docker exec openclaw-test ip route | \
          grep default && exit 1 || echo "No default route: OK"

      - name: Verify iptables default DROP (in shared netns)
        run: |
          docker exec --user 0 openclaw-netns sh -c "iptables -S | grep '^-P OUTPUT DROP'"

      - name: Show container status + logs (debug)
        if: always()
        run: |
          docker ps -a
          echo "---- openclaw-firewall logs ----"
          docker logs --tail 200 openclaw-firewall || true
          echo "---- openclaw-netns logs ----"
          docker logs --tail 200 openclaw-netns || true
          echo "---- openclaw-test logs ----"
          docker logs --tail 200 openclaw-test || true

      - name: Run in-container security tests
        run: |
          docker exec openclaw-test sh /security-test.sh

      - name: Cleanup
        if: always()
        run: docker compose -f infra/docker-compose.yml down --volumes --remove-orphans
