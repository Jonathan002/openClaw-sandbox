name: Sandbox Security CI

on:
  workflow_dispatch:
  push:
    paths:
      - infra/docker-compose.yml
      - infra/squid.conf
      - infra/openclaw/**
      - policy/**
      - .github/workflows/sandbox-ci.yml
  pull_request:

jobs:
  sandbox-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start Sandbox
        run: docker compose -f infra/docker-compose.yml up -d --build

      - name: Show openclaw logs (debug)
        if: always()
        run: |
          docker ps -a
          docker logs --tail 200 openclaw-test || true

      - name: Wait for openclaw to be healthy
        run: |
          set -e
          for i in $(seq 1 30); do
            status="$(docker inspect -f '{{.State.Health.Status}}' openclaw-test 2>/dev/null || echo starting)"
            echo "openclaw health: $status"
            if [ "$status" = "healthy" ]; then
              exit 0
            fi
            if [ "$status" = "unhealthy" ]; then
              docker logs --tail 200 openclaw-test || true
              exit 1
            fi
            sleep 2
          done
          echo "Timed out waiting for openclaw-test to become healthy"
          docker logs --tail 200 openclaw-test || true
          exit 1

      - name: Verify no internet route
        run: |
          docker exec openclaw-test ip route | \
          grep default && exit 1 || echo "No default route: OK"

      - name: Verify iptables default DROP
        run: |
          docker exec --user 0 openclaw-test sh -c "iptables -S | grep '^-P OUTPUT DROP'"

      - name: Run in-container security tests
        run: |
          docker exec openclaw-test sh /security-test.sh

      - name: Cleanup
        if: always()
        run: docker compose -f infra/docker-compose.yml down --volumes --remove-orphans
